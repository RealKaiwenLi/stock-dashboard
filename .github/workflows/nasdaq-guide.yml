name: Nasdaq Guide Signal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1-5"

jobs:
  signal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "pandas>=2.2,<3" "pandas_market_calendars>=4.4,<5"

      - name: Gate on NYSE trading day for scheduled runs
        id: gate
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os
          import pandas_market_calendars as mcal

          la_now = datetime.now(ZoneInfo("America/Los_Angeles"))
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          nyse = mcal.get_calendar("NYSE")
          schedule = nyse.schedule(start_date=la_now.date().isoformat(), end_date=la_now.date().isoformat())
          market_open = not schedule.empty
          final = True if event_name == "workflow_dispatch" else market_open

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"la_now={la_now.isoformat()}\n")
              fh.write(f"market_open={'true' if market_open else 'false'}\n")
              fh.write(f"event_name={event_name}\n")
              fh.write(f"run_job={'true' if final else 'false'}\n")
          PY

      - name: Run signal script
        if: steps.gate.outputs.run_job == 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python scripts/nasdaq_guide_signal.py --config scripts/nasdaq_guide_config.json

      - name: Upload markdown artifact
        if: steps.gate.outputs.run_job == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nasdaq-guide-markdown
          path: outputs/current_hold_signal_*.md
          if-no-files-found: error

      - name: Skip summary
        if: steps.gate.outputs.run_job != 'true'
        run: |
          echo "Skipping run. Event: ${{ steps.gate.outputs.event_name }}, LA time: ${{ steps.gate.outputs.la_now }}, NYSE open: ${{ steps.gate.outputs.market_open }}"
